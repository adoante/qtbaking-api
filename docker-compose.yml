services:
  backend:
    build: .
    depends_on:
      - db
    env_file:
      - .env
    expose:
      - "8080"
    networks:
      - default
      - webnet # For Caddy reverse proxy

  db:
    image: postgres:latest
    restart: always

    ports:
      - "4321:5432"

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    volumes:
      - postgres_data:/var/lib/postgresql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

networks:
  webnet:
    external: true

volumes:
  postgres_data:
